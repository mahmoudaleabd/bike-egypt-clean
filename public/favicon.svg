<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bikeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Back wheel -->
  <circle cx="16" cy="40" r="12" fill="none" stroke="url(#bikeGradient)" stroke-width="3"/>
  <circle cx="16" cy="40" r="2" fill="url(#bikeGradient)"/>
  <!-- Front wheel -->
  <circle cx="48" cy="40" r="12" fill="none" stroke="url(#bikeGradient)" stroke-width="3"/>
  <circle cx="48" cy="40" r="2" fill="url(#bikeGradient)"/>
  <!-- Frame -->
  <path d="M16 40 L28 20 L40 20 L48 40" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 20 L28 40" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round"/>
  <path d="M28 40 L16 40" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round"/>
  <!-- Handlebar -->
  <path d="M40 20 L40 14" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round"/>
  <path d="M36 14 L44 14" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round"/>
  <!-- Seat -->
  <path d="M24 20 L24 14" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round"/>
  <path d="M20 14 L28 14" fill="none" stroke="url(#bikeGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>
